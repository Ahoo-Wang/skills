    <text x="0" y="90" font-family="Noto Sans CJK SC, Inter, Arial" font-size="20" fill="#0B1020">• Nodes = plugin connection points</text>
    <text x="0" y="128" font-family="Noto Sans CJK SC, Inter, Arial" font-size="20" fill="#0B1020">• Gradient = sync across sources</text>
    <text x="0" y="186" font-family="Noto Sans CJK SC, Inter, Arial" font-size="32" font-weight="800" fill="#346CFF">Minimum sizes</text>
    <text x="0" y="238" font-family="Noto Sans CJK SC, Inter, Arial" font-size="20" fill="#0B1020">Digital mark: 24 px minimum</text>
