    <text x="0" y="386" font-family="Noto Sans CJK SC, Inter, Arial" font-size="20" fill="#0B1020">Use full color on light surfaces;</text>
    <text x="0" y="424" font-family="Noto Sans CJK SC, Inter, Arial" font-size="20" fill="#0B1020">use monochrome where color is limited.</text>
