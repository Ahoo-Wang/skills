name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate marketplace
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install script dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq rsync

      - name: Run regression tests
        run: npm test

      - name: Check whitespace errors
        run: git diff --check
