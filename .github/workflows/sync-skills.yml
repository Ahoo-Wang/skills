# Sync skills from source repositories
# 从源仓库同步 skills 到聚合仓库
name: Sync Skills

on:
  schedule:
    # Run every 6 hours (02:00, 08:00, 14:00, 20:00 UTC)
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout skills repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync skills from source repos
        id: sync
        run: |
          set +e
          scripts/sync-sources.sh repos.json sources .sync-sources.json
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -ne 0 ] && [ $EXIT_CODE -ne 2 ]; then
            echo "Error: Sync failed with exit code $EXIT_CODE" >&2
            exit 1
          fi

          scripts/generate-plugins.sh

          if [ -n "$(git status --porcelain -- sources .sync-sources.json plugins .claude-plugin/marketplace.json .agents/plugins/marketplace.json)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate skill files
        run: bash scripts/validate-skills.sh

      - name: Commit and push changes
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A sources/ .sync-sources.json plugins/ .claude-plugin/marketplace.json .agents/plugins/marketplace.json
          git commit -m "chore: sync skills from source repos [skip ci]"
          git push
