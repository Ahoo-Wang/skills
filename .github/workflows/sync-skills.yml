# Sync skills from source repositories
# 从源仓库同步 skills 到聚合仓库
name: Sync Skills

on:
  schedule:
    # Run every 6 hours (02:00, 08:00, 14:00, 20:00 UTC)
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout skills repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync skills from source repos
        id: sync
        run: |
          set +e
          scripts/sync-skills.sh repos.json skills
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Error: Sync failed with exit code $EXIT_CODE" >&2
            exit 1
          fi

      - name: Validate skill files
        if: steps.sync.outputs.changed == 'true'
        run: |
          for skill_dir in skills/*/; do
            skill_file="$skill_dir/SKILL.md"
            if [ ! -f "$skill_file" ]; then
              echo "Error: Missing SKILL.md in $skill_dir" >&2
              exit 1
            fi
            if ! head -1 "$skill_file" | grep -q "^---"; then
              echo "Error: Missing YAML frontmatter in $skill_file" >&2
              exit 1
            fi
          done
          echo "All skills validated successfully"

      - name: Commit and push changes
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync skills from source repos [skip ci]"
          git push
