# Sync skills from source repositories
# 从源仓库同步 skills 到聚合仓库
name: Sync Skills

on:
  schedule:
    # Run every 6 hours (02:00, 08:00, 14:00, 20:00 UTC)
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout skills repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync skills from source repos
        id: sync
        run: |
          if scripts/sync-skills.sh repos.json skills; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync skills from source repos [skip ci]"
          git push
